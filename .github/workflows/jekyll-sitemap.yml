name: Build and Deploy Jekyll to gh-pages (single job)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Bundler
        run: |
          gem install bundler -v "~> 2.7" --no-document || gem install bundler --no-document
          bundle -v

      - name: Install Gems
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Build site
        run: bundle exec jekyll build --destination ./_site

      - name: Gzip sitemap if exists
        run: |
          if [ -f ./_site/sitemap.xml ]; then
            gzip -c ./_site/sitemap.xml > ./_site/sitemap.xml.gz
            echo "Created sitemap.xml.gz"
          else
            echo "No sitemap.xml found"
          fi

      - name: List _site for debug
        run: ls -la ./_site || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
